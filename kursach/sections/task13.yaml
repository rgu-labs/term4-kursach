id: task13
title: "Статистический анализ случайных графов"
numbered: true
body:
  - type: paragraph
    text: |
      Разработана программа для генерации случайных взвешенных графов и
      вычисления набора графовых характеристик методом Монте-Карло. Для
      эффективной работы с памятью реализована многоуровневая система
      аллокаторов.

subsections:

  - id: task13_model
    title: "Математическая модель"
    numbered: true
    body:
      - type: paragraph
        text: |
          Генерируется неориентированный взвешенный граф $G = (V, E)$
          с $|V| = n$ вершинами. Для каждой пары $(i,j)$ независимо:

      - type: formula
        id: eq.graph_generation
        content: |-
          P(e_{ij} \neq 0) = d, \quad w_{ij} \sim U\{1, 2, \ldots, L\}

      - type: paragraph
        text: |
          где $d$ — плотность графа, $L$ — максимальный вес ребра.
          Вес $w_{ij} = 0$ означает отсутствие ребра.

      - type: paragraph
        text: |
          Для каждого сгенерированного графа вычисляются следующие
          характеристики:

      - type: table
        id: tbl.metrics
        caption: "Характеристики случайного графа"
        columns: ["Метрика", "Обозначение", "Алгоритм", "Сложность"]
        rows:
          - ['Вес MST', '$\text{MST}(G)$', 'Прима', '$O(n^2)$']
          - ['Длина цикла (макс.)', '$\|C_{\max}\|$', 'DFS (исчерп.)', '$O(n!)$']
          - ['Вес цикла (макс.)', '$W(C_{\max})$', 'DFS (исчерп.)', '$O(n!)$']
          - ['Изолированные вершины', '$I(G)$', 'Перебор', '$O(n^2)$']
          - ['Число остовных деревьев', '$\tau(G)$', 'Кирхгоф + Барейсс', '$O(n^3)$']
          - ['Компоненты связности', '$C_c(G)$', 'BFS', '$O(n^2)$']
          - ['Кликовые компоненты', '$K_c(G)$', 'BFS + проверка', '$O(n^2 + m)$']

      - type: paragraph
        text: |
          {{bold:Вес минимального остовного дерева (MST).}} Вычисляется
          алгоритмом Прима за $O(n^2)$:

      - type: formula
        id: eq.mst
        content: '\text{MST}(G) = \sum_{v \in V} \min_{u \in S, (u,v) \in E} w(u,v)'

      - type: paragraph
        text: |
          где $S$ — множество уже включённых в MST вершин. Алгоритм поддерживает
          массив {{code:key[v]}} — минимальный вес ребра, соединяющего $v$
          с текущим MST, и массив {{code:in\_mst[v]}} — флаг включения вершины.

      - type: listing
        id: lst.prim_mst
        language: C++
        caption: 'Алгоритм Прима для вычисления веса MST'
        content: |
          i32 mst_weight(const Graph& g) {
            i32 n = g.n;
            if (n <= 1) return 0;

            constexpr i32 kInf = numeric_limits<i32>::max();
            i32 key[n];    bool in_mst[n];
            for (i32 i = 0; i < n; i++) {
              key[i] = kInf;   in_mst[i] = false;
            }
            key[0] = 0;

            i32 total = 0;
            for (i32 iter = 0; iter < n; iter++) {
              i32 u = -1;
              for (i32 v = 0; v < n; v++)
                if (!in_mst[v] && (u == -1 || key[v] < key[u]))
                  u = v;

              if (key[u] == kInf) break;
              in_mst[u] = true;
              total += key[u];

              for (i32 v = 0; v < n; v++)
                if (!in_mst[v] && edge_exists(g, u, v))
                  key[v] = min(key[v], (i32)edge_weight(g, u, v));
            }
            return total;
          }

      - type: paragraph
        text: |
          Граф хранится в виде сжатой верхне-треугольной матрицы смежности:
          рёбра $E = \{w_{ij} \mid 0 \le i < j < n\}$ упакованы в
          {{code:std::span<u8>}}, доступ по {{code:edge\_index(n,i,j)}} за $O(1)$.
          Нулевой вес означает отсутствие ребра.

      - type: paragraph
        text: |
          {{bold:Число остовных деревьев.}} Вычисляется по матричной теореме
          Кирхгофа: число остовных деревьев $\tau(G)$ равно определителю
          редуцированной матрицы Лапласа $L'$ размера $(n-1) \times (n-1)$:

      - type: formula
        id: eq.laplacian
        content: |-
          L'_{ij} = \begin{cases}
          \deg(i), & i = j, \\
          -1,      & (i,j) \in E, \\
          0,       & \text{иначе}
          \end{cases}

      - type: paragraph
        text: |
          Определитель вычисляется алгоритмом Барейсса (бесскобочное
          исключение Гаусса), который оперирует целыми числами и избегает
          накопления ошибок округления:

      - type: formula
        id: eq.bareiss
        content: |-
          a_{i,j}^{(k+1)} = \frac{a_{i,j}^{(k)} \cdot a_{k,k}^{(k)}
          - a_{i,k}^{(k)} \cdot a_{k,j}^{(k)}}{a_{k-1,k-1}^{(k-1)}}

      - type: listing
        id: lst.bareiss
        language: C++
        caption: 'Алгоритм Барейсса: определитель редуцированной матрицы Лапласа'
        content: |
          i64 count_spanning_trees(const Graph& g) {
            i32 n = g.n;
            if (n <= 1) return 1;

            i32 m = n - 1;
            vector<vector<i64>> a(m, vector<i64>(m, 0));

            // reduced Laplacian matrix
            for (i32 i = 0; i < m; i++) {
              for (i32 k = 0; k < n; k++)
                if (k != i && edge_exists(g, i, k))
                  a[i][i]++;                     // vertex degree

              for (i32 j = 0; j < m; j++)
                if (i != j)
                  a[i][j] = edge_exists(g, i, j) ? -1 : 0;
            }

            i64 prev = 1;
            for (i32 k = 0; k < m; k++) {
              if (a[k][k] == 0) return 0;        // graph is disconnected

              for (i32 i = k + 1; i < m; i++)
                for (i32 j = k + 1; j < m; j++)
                  a[i][j] = (a[i][j] * a[k][k] -
                             a[i][k] * a[k][j]) / prev;

              prev = a[k][k];
            }
            return a[m - 1][m - 1];
          }

      - type: paragraph
        text: |
          {{bold:Статистическое агрегирование.}} По результатам $N$ испытаний
          вычисляются выборочные средние и дисперсии для каждой метрики:

      - type: formula
        id: eq.stats
        content: '\bar{x} = \frac{1}{N}\sum_{k=1}^{N} x_k, \qquad
          \hat{\sigma}^2 = \frac{1}{N}\sum_{k=1}^{N} x_k^2 - \bar{x}^2'

  - id: task13_implementation
    title: "Программная реализация"
    numbered: true
    body:
      - type: paragraph
        text: |
          Приложение принимает на вход JSON-файл конфигурации и имя выходного
          файла. Симуляция выполняется в несколько потоков.

      - type: listing
        id: lst.task13_config_json
        language: C++
        caption: 'Пример конфигурационного файла config.json'
        content: |
          {
              "n":              10,
              "edge_length":    10,
              "graph_density":  0.99,
              "seed":           14527346871,
              "precision":      "extreme",
              "metrics": {
                  "mst_weight":          true,
                  "longest_cycle_edges": true,
                  "heaviest_cycle_edges":true,
                  "isolated_vertices":   true,
                  "spanning_trees":      true,
                  "connected_components":true,
                  "clique_components":   true
              }
          }

      - type: paragraph
        text: |
          {{bold:Параллельная симуляция.}} Каждый поток имеет собственный
          генератор случайных чисел и собственный аренный аллокатор, что
          исключает необходимость синхронизации при записи результатов.

      - type: listing
        id: lst.simulator
        language: C++
        caption: 'Параллельный цикл симуляции'
        content: |
          void run_simulation(const SimulatorConfig& config,
                              SimulatorResult& result)
          {
              int threads = std::thread::hardware_concurrency();
              std::vector<std::thread> pool;
              std::mutex mutex;
              Accum global_accums[7] = {};

              for (int t = 0; t < threads; t++) {
                  pool.emplace_back([&, t]() {
                      VirtualHeap heap;
                      heap.init(g_os_memory, megabytes(4));
                      ArenaAllocator arena;
                      arena.init(heap.take(megabytes(4)));

                      std::mt19937 rng(config.seed ^ t);

                      Accum local_accums[7] = {};
                      int trials_per_thread = config.total_trials / threads;

                      for (int i = 0; i < trials_per_thread; i++) {
                          auto mark = arena.save();

                          Graph graph;
                          generate_graph(graph, config, rng, arena);

                          for (int m = 0; m < 7; m++) {
                              if (config.metrics[m]) {
                                  double value = compute_metric(
                                      static_cast<Metric>(m), graph, arena);
                                  local_accums[m].add(value);
                              }
                          }

                          arena.restore(mark);
                      }

                      std::lock_guard lock(mutex);
                      for (int m = 0; m < 7; m++)
                          global_accums[m].merge(local_accums[m]);
                  });
              }

              for (auto& t : pool) t.join();
          }

      - type: paragraph
        text: |
          {{bold:Система аллокаторов.}} Реализована многоуровневая иерархия
          управления памятью:
          \begin{enumerate}
            \item {{code:OSMemory}} — резервирование/фиксация виртуальной
                  памяти через {{code:mmap}};
            \item {{code:VirtualHeap}} — резервирование непрерывного диапазона
                  адресов с автоматической фиксацией страниц;
            \item {{code:ArenaAllocator}} — линейный аллокатор с сохранением
                  и восстановлением состояния (стекинг);
            \item {{code:ArenaResource}} — адаптер {{code:std::pmr::memory\_resource}}
                  для использования с PMR-контейнерами.
          \end{enumerate}
          Аренная модель позволяет освободить всю память, выделенную за
          испытание, одной операцией {{code:restore()}}, что исключает
          фрагментацию и ускоряет повторяющиеся выделения.

      - type: listing
        id: lst.arena_allocator
        language: C++
        caption: 'Интерфейс аренного аллокатора (bump allocator)'
        content: |
          class ArenaAllocator final {
          public:
            void init(MemoryBlock block);

            void* push(usize size, usize align);  // allocate memory
            void  reset();                         // reset to start

            struct Marker { usize offset; };
            Marker save() const;                   // save position
            void   restore(Marker m);              // restore to position
          private:
            void*  m_base;    // block base
            usize  m_size;    // total size
            usize  m_offset;  // current offset
          };

          // RAII wrapper: save/restore in ctor/dtor
          struct ScopeArena final {
            ArenaAllocator*       arena;
            ArenaAllocator::Marker tag;

            ScopeArena(ArenaAllocator* a)
              : arena(a), tag(a->save()) {}
            ~ScopeArena() { arena->restore(tag); }
          };

      - type: figure
        id: fig.task13_console
        path: "assets/task13.png"
        caption: "Результат статистического анализа случайного графа"
        width: 0.9
      - type: page_break
