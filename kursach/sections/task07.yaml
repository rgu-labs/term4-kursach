id: task07
title: "Комплексная плоскость и случайные блуждания с фиксированным шагом"
numbered: true
body:
  - type: paragraph
    text: |
      Рассматривается случайное блуждание на комплексной плоскости с фиксированной
      длиной шага. Направление каждого шага выбирается из конечного набора
      равноотстоящих углов. Моделируется процесс накопления траектории и
      оценивается вероятность возврата в окрестность начала координат.

subsections:

  - id: task07_model
    title: "Математическая модель"
    numbered: true
    body:
      - type: paragraph
        text: |
          Блуждание начинается в точке $z_0 = 0$ комплексной плоскости. На
          каждом шаге $k$ частица перемещается на фиксированное расстояние
          $\rho$ в одном из $n$ возможных направлений.

      - type: formula
        id: eq.complex_walk
        content: 'z_k = z_{k-1} + \rho \cdot e^{i\frac{2\pi}{n}\xi_k}, \qquad z_0 = 0'

      - type: paragraph
        text: |
          где $\rho > 0$ — радиус шага, $n \in \{4, 5, \ldots, 32\}$ — число
          допустимых направлений, $\xi_k \in \{0, 1, \ldots, n-1\}$ — случайный
          индекс направления, подчинённый одному из четырёх законов распределения.

      - type: formula
        id: eq.cartesian_walk
        content: |-
          \begin{cases}
          x_k = x_{k-1} + \rho \cos\!\big(\frac{2\pi}{n}\xi_k\big) \\[4pt]
          y_k = y_{k-1} + \rho \sin\!\big(\frac{2\pi}{n}\xi_k\big)
          \end{cases}
          \qquad (x_0, y_0) = (0, 0)

      - type: paragraph
        text: |
          Поддерживаются четыре закона распределения индекса $\xi_k$:
          равномерное, биномиальное, усечённое геометрическое и дискретное
          треугольное. Каждый закон отображается на кольцо $\mathbb{Z}_n$.

      - type: table
        id: tbl.distributions
        caption: 'Законы распределения индекса направления $\xi_k$'
        columns: ["Распределение", "Функция вероятности", "Параметры"]
        rows:
          - ['Равномерное', '$P(\xi = j) = 1/n$', '—']
          - ['Биномиальное', '$P(\xi = j) = \binom{m}{j} p^j (1-p)^{m-j}$ (mod $n$)', '$m$, $p$']
          - ['Геометрическое (ус.)', '$P(\xi = j) = \frac{p(1-p)^j}{\sum_{i=0}^{n-1} p(1-p)^i}$', '$p$']
          - ['Дискр. треугольное', 'отображение Triangular$(a,b,c)$ на $\{0,\ldots,n-1\}$', '$a$, $b$, $c$']

      - type: paragraph
        text: |
          Блуждание считается вернувшимся в начало координат, если на некотором
          шаге $k > 0$ выполняется условие:

      - type: formula
        id: eq.return_condition
        content: '\|z_k\| = \sqrt{x_k^2 + y_k^2} < \varepsilon'

      - type: paragraph
        text: |
          где $\varepsilon$ — малый порог (по умолчанию $0{,}01$). При
          выполнении условия блуждание завершается досрочно.

  - id: task07_simulation
    title: "Ядро симуляции"
    numbered: true
    body:
      - type: paragraph
        text: |
          Класс {{code:ComplexWalkSimulation}} инкапсулирует конфигурацию
          блуждания, генератор случайных чисел и методы для одиночного и
          пакетного запуска. Каждый запуск генерирует последовательность точек
          {{code:(x\_k, y\_k)}} и проверяет условие возврата.

      - type: listing
        id: lst.task07_run_single
        language: C++
        caption: 'Метод run\_single() — одно блуждание до K шагов или до возврата'
        content: |
          WalkResult ComplexWalkSimulation::run_single() {
              WalkResult r;
              r.path.push_back({0.0, 0.0});
              for (int step = 1; step <= m_cfg.K; step++) {
                  int xi = sample_xi();
                  double dx = m_cfg.rho * std::cos(2.0 * M_PI / m_cfg.n * xi);
                  double dy = m_cfg.rho * std::sin(2.0 * M_PI / m_cfg.n * xi);
                  Point2D pt{r.path.back().x + dx, r.path.back().y + dy};
                  r.path.push_back(pt);
                  if (std::hypot(pt.x, pt.y) < m_cfg.epsilon) {
                      r.returned = true;
                      r.return_step = step;
                      return r;
                  }
              }
              r.returned = false;
              r.return_step = -1;
              return r;
          }

      - type: paragraph
        text: |
          Метод {{code:sample\_xi()}} генерирует индекс $\xi$ в соответствии
          с выбранным законом распределения.

      - type: paragraph
        text: |
          {{code:std::uniform\_int\_distribution}} используется
          для равномерного распределения.

      - type: paragraph
        text: |
          {{code:std::binomial\_distribution}} применяется
          для биномиального с последующим приведением по модулю $n$.

      - type: paragraph
        text: |
          {{code:std::discrete\_distribution}} применяется
          для геометрического распределения (взвешенная выборка).

      - type: paragraph
        text: |
          Для треугольного распределения выполняется обратное
          преобразование непрерывного Triangular$(a,b,c)$
          с последующим округлением до ближайшего целого.

      - type: listing
        id: lst.sample_xi
        language: C++
        caption: 'Генерация индекса направления sample\_xi() для треугольного распределения'
        content: |
          int ComplexWalkSimulation::sample_xi_triangular() {
              double u = std::uniform_real_distribution<double>{0.0, 1.0}(m_rng);
              double fc = (m_cfg.tri_c - m_cfg.tri_a);
              double fb = (m_cfg.tri_b - m_cfg.tri_a) / fc;
              double s;
              if (u <= fb) {
                  s = m_cfg.tri_a
                    + std::sqrt(u * fc * (m_cfg.tri_b - m_cfg.tri_a));
              } else {
                  s = m_cfg.tri_c
                    - std::sqrt((1.0 - u) * fc * (m_cfg.tri_c - m_cfg.tri_b));
              }
              int idx = static_cast<int>(s / fc * (m_cfg.n - 1) + 0.5);
              return std::clamp(idx, 0, m_cfg.n - 1);
          }

      - type: listing
        id: lst.run_batch
        language: C++
        caption: 'Пакетный запуск M блужданий методом run\_batch()'
        content: |
          std::vector<WalkResult> ComplexWalkSimulation::run_batch(int m) {
              std::vector<WalkResult> results;
              results.reserve(m);
              for (int i = 0; i < m; i++)
                  results.push_back(run_single());
              return results;
          }

  - id: task07_gui
    title: "Графический интерфейс"
    numbered: true
    body:
      - type: paragraph
        text: |
          Приложение построено на Qt6 Quick. Левая панель содержит органы
          управления параметрами; правая область отображает траекторию или
          статистику в зависимости от выбранной вкладки.

      - type: paragraph
        text: |
          {{bold:Параметры.}} Ползунки $\rho$ (радиус шага), $n$ (число
          направлений), $K$ (максимальное число шагов), $\varepsilon$ (порог
          возврата). Селектор распределения: четыре кнопки (UNIFORM, BINOMIAL,
          GEOMETRIC, TRIANGULAR) с условно отображаемыми параметрами.

      - type: paragraph
        text: |
          {{bold:Вкладка «Траектория».}} Компонент {{code:ComplexPlaneChart}}
          отображает траекторию на комплексной плоскости с масштабированием,
          координатной сеткой, линиями допустимых направлений, точками шагов и
          маркерами начала/конца. Траектории, вернувшиеся в начало, выделяются
          зелёным цветом.

      - type: paragraph
        text: |
          {{bold:Вкладка «Статистика».}} Отображает накопленную вероятность
          возврата $\hat{P}_{\text{return}}$ с указанием числа вернувшихся
          траекторий и общего числа запусков. Приводится сводка активной
          конфигурации.

      - type: paragraph
        text: |
          {{bold:Пакетный режим.}} $M$ блужданий выполняются асинхронно
          посредством {{code:QtConcurrent::run}}. Интерфейс остаётся
          отзывчивым во время расчёта. Результат — доля траекторий,
          вернувшихся в начало координат.

      - type: figure
        id: fig.task07_results
        path: "assets/task07_gui.png"
        caption: "Интерфейс приложения: панель управления и траектория на комплексной плоскости"
        width: 0.8
      - type: page_break
