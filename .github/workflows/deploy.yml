name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  CARGO_TERM_COLORS: always

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install C++ dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            g++ cmake ninja-build \
            qt6-base-dev libglfw3-dev libgl1-mesa-dev libglew-dev \
            nlohmann-json3-dev libspdlog-dev \
            cargo rustc

      - name: Install LaTeX
        run: |
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex \
            texlive-lang-cyrillic \
            texlive-fonts-extra \
            texlive-fonts-recommended \
            texlive-latex-extra \
            texlive-science \
            fonts-linuxlibertine \
            lmodern

      - name: Build imgui & implot (static libs)
        run: |
          # imgui
          git clone --depth 1 --branch v1.91.8 \
            https://github.com/ocornut/imgui.git /tmp/imgui
          cd /tmp/imgui
          g++ -std=c++11 -c -O2 \
            -DIMGUI_IMPL_OPENGL_LOADER_GLEW \
            -I. -Ibackends \
            imgui.cpp imgui_draw.cpp imgui_tables.cpp imgui_widgets.cpp \
            backends/imgui_impl_glfw.cpp backends/imgui_impl_opengl3.cpp
          ar rcs libimgui.a imgui.o imgui_draw.o imgui_tables.o \
            imgui_widgets.o imgui_impl_glfw.o imgui_impl_opengl3.o

          # implot
          git clone --depth 1 --branch v0.16 \
            https://github.com/epezent/implot.git /tmp/implot
          cd /tmp/implot
          g++ -std=c++11 -c -O2 -I. -I/tmp/imgui implot.cpp implot_items.cpp
          ar rcs libimplot.a implot.o implot_items.o

      - name: Install imgui & implot
        run: |
          sudo cp /tmp/imgui/*.h /usr/local/include/
          sudo cp /tmp/imgui/backends/*.h /usr/local/include/
          sudo cp /tmp/implot/*.h /usr/local/include/
          sudo cp /tmp/imgui/libimgui.a /tmp/implot/libimplot.a /usr/local/lib/
          sudo ldconfig

      - name: Build kursach-autogen
        run: |
          git clone --depth 1 \
            https://github.com/koftamainee/kursach-autogen.git \
            /tmp/kursach-autogen
          cargo build --release --manifest-path /tmp/kursach-autogen/Cargo.toml
          mkdir -p bin
          cp /tmp/kursach-autogen/target/release/kursach-autogen bin/

      - name: Build all tasks
        run: |
          for task_path in tasks/*/; do
            [ -f "$task_path/CMakeLists.txt" ] || continue
            name=$(basename "$task_path")
            echo "==> BUILD $name"
            cmake -S "$task_path" -B "$task_path/build_release" \
              -G Ninja -DCMAKE_BUILD_TYPE=Release
            cmake --build "$task_path/build_release"

            dest="$PWD/target/tasks/$name"
            mkdir -p "$dest"

            if [ -d "$task_path/build_release/target" ]; then
              cp -r "$task_path/build_release/target"/. "$dest/"
            else
              binary=$(find "$task_path/build_release" -maxdepth 1 \
                -type f -executable | head -n 1)
              [ -n "$binary" ] && cp "$binary" "$dest/"
            fi

            for f in "$task_path"/*.json "$task_path"/*.txt; do
              [ -f "$f" ] && cp "$f" "$dest/"
            done
            if [ -d "$task_path/qml" ]; then
              cp -r "$task_path/qml" "$dest/"
            fi
            echo "==> DONE $name"
          done

      - name: Generate PDF
        run: |
          cd kursach
          ../bin/kursach-autogen kursach.yaml --output ../tmp/pdf
          test -f ../tmp/pdf/main.pdf

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site/tasks

          cp tmp/pdf/main.pdf _site/kursach.pdf

          for task_dir in target/tasks/*/; do
            name=$(basename "$task_dir")
            cd "$task_dir"
            zip -r "$OLDPWD/_site/tasks/$name.zip" .
            cd "$OLDPWD"
          done

          cp website/index.html _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    runs-on: ubuntu-24.04
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
