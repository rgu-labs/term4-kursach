<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Курсовая работа — Вероятностное моделирование</title>
<style>
  :root {
    --bg: #0f0c1f;
    --surface: #1b1733;
    --card: #2a244a;
    --accent: #8b5cf6;
    --text: #e0d9ff;
    --muted: #a5a1b8;
    --success: #34d399;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 2rem;
  }
  .container { max-width: 800px; width: 100%; }
  h1 {
    font-size: 1.75rem;
    font-weight: 700;
    margin-bottom: .25rem;
    color: #fff;
  }
  .subtitle {
    color: var(--muted);
    margin-bottom: 2rem;
    font-size: .95rem;
  }
  .card {
    background: var(--card);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    text-decoration: none;
    color: var(--text);
    transition: background .2s, transform .2s;
    border: 1px solid transparent;
  }
  .card:hover {
    background: #35306a;
    transform: translateY(-2px);
    border-color: var(--accent);
  }
  .card .icon {
    font-size: 1.5rem;
    flex-shrink: 0;
    width: 2.5rem;
    height: 2.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    background: var(--surface);
  }
  .card .info { flex: 1; min-width: 0; }
  .card .info strong { display: block; font-size: 1rem; }
  .card .info small { color: var(--muted); font-size: .8rem; }
  .card .badge {
    font-size: .7rem;
    padding: .2rem .6rem;
    border-radius: 4px;
    background: var(--accent);
    color: #fff;
    flex-shrink: 0;
  }
  .section-title {
    font-size: .8rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
    margin: 2rem 0 .75rem;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: .5rem;
  }
  .grid .card { padding: .75rem 1rem; }
  .grid .card .icon { width: 1.8rem; height: 1.8rem; font-size: 1rem; }
  .footer {
    margin-top: 2rem;
    text-align: center;
    color: var(--muted);
    font-size: .8rem;
  }
  .footer a { color: var(--accent); }
</style>
</head>
<body>
<div class="container">
  <h1>📐 Курсовая работа</h1>
  <p class="subtitle">Вероятностное моделирование процессов и систем — ИТПМ-124</p>

  <div class="section-title">📄 Документ</div>
  <a class="card" href="kursach.pdf" target="_blank">
    <div class="icon">📕</div>
    <div class="info">
      <strong>Пояснительная записка</strong>
      <small>Полный текст курсовой работы в формате PDF</small>
    </div>
    <span class="badge">PDF</span>
  </a>

  <div class="section-title">⚙️ Собранные задачи</div>
  <div class="grid" id="task-list"></div>

  <div class="footer">
    Собрано с ❤️ с помощью
    <a href="https://github.com/features/actions" target="_blank">GitHub Actions</a> ·
    <a href="https://github.com/koftamainee/kursach-autogen" target="_blank">kursach-autogen</a>
  </div>
</div>

<script>
const TASKS = [
  { num: 1,  name: "01-alphabet-sampling",      label: "Алфавитная выборка",           gui: false },
  { num: 2,  name: "02-epidemic-simulation",    label: "Эпидемия",                     gui: true  },
  { num: 3,  name: "03-rumor-propagation",      label: "Распространение слухов",        gui: true  },
  { num: 4,  name: "04-random-walk-2d",         label: "Случайное блуждание (2D)",      gui: true  },
  { num: 5,  name: "05-cluster-pattern",        label: "Кластеры и k-паттерны",        gui: false },
  { num: 6,  name: "06-step-function",          label: "Ступенчатая фигура",            gui: true  },
  { num: 7,  name: "07-complex-walk",           label: "Комплексное блуждание",         gui: true  },
  { num: 8,  name: "08-barrel-explosion",       label: "Взрыв бочки",                  gui: false },
  { num: 9,  name: "09-cryptanalysis",          label: "Криптоанализ",                 gui: false },
  { num: 10, name: "10-coin-tossing",           label: "Подбрасывание монеты",          gui: false },
  { num: 11, name: "11-discrete-rv",            label: "Дискретная СВ",                gui: false },
  { num: 12, name: "12-buffon-needle",          label: "Игла Бюффона",                 gui: true  },
  { num: 13, name: "13-graph-statistics",       label: "Статистика графов",            gui: false },
];

const list = document.getElementById("task-list");
for (const t of TASKS) {
  const a = document.createElement("a");
  a.className = "card";
  a.href = `tasks/${t.name}.zip`;
  a.innerHTML = `
    <div class="icon">${t.gui ? "🖥️" : "⌨️"}</div>
    <div class="info">
      <strong>${t.label}</strong>
      <small>Задача ${String(t.num).padStart(2, "0")}</small>
    </div>
    <span class="badge">${t.gui ? "GUI" : "CLI"}</span>
  `;
  list.appendChild(a);
}
</script>
</body>
</html>
